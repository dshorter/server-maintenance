services:
  # PostgreSQL for HVAC Digital Twin Demo
  postgres:
    image: postgres:15-alpine
    container_name: hvac-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=hvac_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hvac_demo_pass_2025}
      - POSTGRES_DB=hvac_demo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hvac_user -d hvac_demo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://agents-platform.ngrok.io
      - GENERIC_TIMEZONE=America/New_York
      - N8N_METRICS=true
      - N8N_LOG_LEVEL=info
      - N8N_LOG_OUTPUT=console
      - EXECUTIONS_PROCESS=main,scheduler
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=true
      - N8N_DIAGNOSTICS_ENABLED=false  
      - N8N_STATIC_DATA_MODE=fileSystem 

    volumes:
      - /root/n8n-data:/home/node/.n8n
      - /root/n8n-data/transactions:/data/transactions
      - /root/n8n-data/backups:/data/backups
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  predictor:
    profiles: ["predictor"]
    build:
      context: ../predictor_ingest
      dockerfile: ../ai-agent-platform/predictor/Dockerfile
    container_name: predictor-pipeline
    restart: unless-stopped
    volumes:
      - predictor-data:/app/data
      - ../predictor_ingest/web:/app/web:ro
    environment:
      - TZ=America/New_York
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    networks:
      - app-network

  web:
    image: nginx:alpine
    container_name: web-server
    restart: unless-stopped
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../predictor_ingest/web:/srv/predictor:ro
    ports:
      - "80:80"
    depends_on:
      - n8n
    networks:
      - app-network

  ngrok:
    image: ngrok/ngrok:alpine
    container_name: ngrok
    restart: unless-stopped
    command:
      - "http"
      - "web-server:80"
      - "--url=agents-platform.ngrok.io"
      - "--log-level=info"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "127.0.0.1:4040:4040"
    depends_on:
      - web
    networks:
      - app-network

  # Ghost blog + MySQL
  # Caddy on the host proxies blog.uzelhub.com -> 127.0.0.1:2368
  ghost-mysql:
    image: mysql:8.0
    container_name: ghost-mysql
    restart: unless-stopped
    # Low-memory tuning for 2GB host (defaults would eat ~500MB)
    command:
      - "--default-authentication-plugin=mysql_native_password"
      - "--innodb-buffer-pool-size=64M"
      - "--performance-schema=OFF"
    environment:
      - MYSQL_ROOT_PASSWORD=${GHOST_MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=ghost_prod
      - MYSQL_USER=ghost
      - MYSQL_PASSWORD=${GHOST_DB_PASSWORD}
    volumes:
      - ghost-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${GHOST_MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-network

  ghost:
    image: ghost:5-alpine
    container_name: ghost
    restart: unless-stopped
    ports:
      - "127.0.0.1:2368:2368"
    environment:
      - NODE_ENV=production
      - url=https://blog.uzelhub.com
      - database__client=mysql
      - database__connection__host=ghost-mysql
      - database__connection__user=ghost
      - database__connection__password=${GHOST_DB_PASSWORD}
      - database__connection__database=ghost_prod
      # Caddy terminates TLS; Ghost sits behind it on plain HTTP
      - server__host=0.0.0.0
      - server__port=2368
    volumes:
      - ghost-content:/var/lib/ghost/content
    depends_on:
      ghost-mysql:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  predictor-data:
    driver: local
  ghost-content:
    driver: local
  ghost-mysql-data:
    driver: local
