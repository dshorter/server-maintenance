events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name _;

        # Demo site at /demo (BEFORE root proxy)
        location /demo {
            alias /usr/share/nginx/html;
            try_files $uri $uri/ /demo/index.html;
        }

        # Predictor web client (serves all static files including data/graphs/)
        location /predictor/ {
            alias /srv/predictor/;
            try_files $uri $uri/ /predictor/index.html;
            add_header Cache-Control "no-cache";
        }

        # Webhooks (still work for Twilio)
        location /webhook/ {
            proxy_pass http://n8n:5678/webhook/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # n8n at ROOT (catches everything else)
        location / {
            proxy_pass http://n8n:5678/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
